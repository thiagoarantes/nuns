<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nun's sheet</title>
    <link href="./styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script type="module" src="./engine/index.js" defer="defer"></script>
  </head>
  <body>
    <form class="form">
      <div class="sheet-header">
        <div>
          <label for="nunSelect">Nun's name</label>
          <div class="select-wrapper">
            <select id="nunSelect" class="nun">
              <option value="Angelica">Angelica</option>
              <option value="Ann-Marie">Ann Marie</option>
              <option value="Bernadette">Bernadette</option>
              <option value="Celeste">Celeste</option>
              <option value="Margaret">Margaret</option>
              <option value="Theresa">Theresa</option>
            </select>
          </div>
          <div class="nun-pic"></div>
        </div>
      </div>
      <div class="sheet-form">
        <div class="sheet-title">
          <div class="round">#</div>
          <div class="movement"></div>
          <div>End Space</div>
          <div>Item</div>
        </div>
        <div class="sheet-rows"></div>
        <div class="sheet-buttons">
          <button type="button" class="button button-primary add-new-round">
            Next
          </button>
          <button type="button" class="button button-secondary reset-game">
            <span class="material-symbols-outlined" data-icon="refresh"
              >refresh</span
            >
            Reset Game
          </button>
        </div>
      </div>
    </form>
    <div class="sheet-empty">Select nun to start game</div>
    <!-- Reset Modal -->
    <div class="modal">
      <!-- Modal content -->
      <div class="modal-content">
        <span class="material-symbols-outlined close">close</span>
        <p>Are you sure you want to reset the game?</p>
        <div>
          <button type="button" class="button button-secondary cancel-close">
            Cancel
          </button>
          <button
            type="button"
            class="button button-primary confirm-reset-game"
          >
            Reset game
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
